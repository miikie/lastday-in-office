name: Cleanup, Poison Diff, Neutralize PR

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  schedule:
    - cron: "*/5 * * * *"

permissions:
  actions: write
  pull-requests: write
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Extract PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              core.setOutput("exists", "false");
              return;
            }

            const pr = prs[0];
            core.setOutput("exists", "true");
            core.setOutput("number", pr.number);
            core.setOutput("ref", pr.head.ref);
            core.setOutput("base", pr.base.ref);

      - name: Checkout PR branch (full history)
        if: steps.pr.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}
          fetch-depth: 0

      - name: Poison changed files & rewrite history
        if: steps.pr.outputs.exists == 'true'
        run: |
          set -e

          BASE_BRANCH="${{ steps.pr.outputs.base }}"

          echo "Fetching base branch: $BASE_BRANCH"
          git fetch origin $BASE_BRANCH

          echo "Calculating merge base..."
          MERGE_BASE=$(git merge-base HEAD origin/$BASE_BRANCH)

          echo "Merge base: $MERGE_BASE"

          echo "Identifying changed files..."
          CHANGED_FILES=$(git diff --name-only --diff-filter=AM $MERGE_BASE HEAD)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files detected."
            exit 0
          fi

          echo "Rewriting history to merge base..."
          git reset --hard $MERGE_BASE

          echo "Poisoning files..."
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              echo "Poisoning $file"
              dd if=/dev/urandom of="$file" bs=1K count=100 status=none
            fi
          done

          git config user.name "ctf-cleanup-bot"
          git config user.email "cleanup@ctf.local"

          git add .
          git commit -m "CTF cleanup: diff poisoned"

          echo "Force pushing rewritten branch..."
          git push origin HEAD --force

      - name: Delete workflow run (logs)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.deleteWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });

      - name: Close and lock PR
        if: steps.pr.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: "closed",
              title: "[REDACTED]",
              body: ""
            });

            await github.rest.issues.lock({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

      - name: Delete PR branch (best effort)
        if: steps.pr.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${{ steps.pr.outputs.ref }}`
              });
            } catch (e) {
              console.log("Branch deletion skipped:", e.message);
            }
